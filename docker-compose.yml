services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - taskflow_pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      ENV: ${ENV}
      SQLALCHEMY_DATABASE_URI: ${SQLALCHEMY_DATABASE_URI}
      APP_VERSION: ${APP_VERSION}
      DEBUG: ${DEBUG}
    depends_on:
      - db
    ports:
      - "${BACKEND_PORT}:5000"
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    ports:
      - "${FRONTEND_PORT}:80"
    depends_on:
      - backend

volumes:
  taskflow_pgdata: